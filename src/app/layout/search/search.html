<div class="search">
  <svg class="search__icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="24.000000" height="24.000000" fill="none">
    <rect id="Icon/search" width="24.000000" height="24.000000" x="0.000000" y="0.000000" fill="rgb(255,255,255)"/>
    <path id="Vector" d="M0 0L24 0L24 24L0 24L0 0Z" fill-rule="nonzero" />
    <path id="Vector" d="M16.5 14L15.71 14L15.43 13.73C16.41 12.59 17 11.11 17 9.5C17 5.91 14.09 3 10.5 3C6.91 3 4 5.91 4 9.5C4 13.09 6.91 16 10.5 16C12.11 16 13.59 15.41 14.73 14.43L15 14.71L15 15.5L20 20.49L21.49 19L16.5 14ZM10.5 14C8.01 14 6 11.99 6 9.5C6 7.01 8.01 5 10.5 5C12.99 5 15 7.01 15 9.5C15 11.99 12.99 14 10.5 14Z" fill="rgb(120,120,120)" fill-rule="nonzero" />
  </svg>

  <input
    (focus)="isFocused.set(true)"
    type="text"
    class="search__input"
    placeholder="Поиск..."
    [formControl]="searchValue"
  />
  <button class="search__btn">НАЙТИ</button>
  @if(isFocused()){
    <div class="search-dropdown">
      <div class="search-dropdown__history">
        <p class="search-dropdown__title">История</p>

        <ul class="search-dropdown__list">
          <li class="search-dropdown__item">закрепить теги</li>
          <li class="search-dropdown__item">кнопка</li>
          <li class="search-dropdown__item">приложение</li>
          <li class="search-dropdown__item">форма</li>
          <li class="search-dropdown__item">текстовое поле</li>
        </ul>
      </div>
      <div class="search-dropdown__filters">

        <div class="search-dropdown__field">
          <label class="search-dropdown__label">Label</label>

          <div class="search-dropdown__input-wrapper">
            <input
              type="text"
              class="search-dropdown__input"
              placeholder="Имя или должность"
            />

            <button class="search-dropdown__input-btn">
              Я
            </button>
          </div>
        </div>
        <div class="search-dropdown__group">
          <label class="search-dropdown__checkbox">
            <input type="checkbox" />
            <span>Я участник</span>
          </label>

          <label class="search-dropdown__checkbox">
            <input type="checkbox" />
            <span>Строгий поиск</span>
          </label>

          <label class="search-dropdown__checkbox">
            <input type="checkbox" />
            <span>В заголовках</span>
          </label>
        </div>

        <div class="search-dropdown__group">
          <p class="search-dropdown__subtitle">Только</p>

          <label class="search-dropdown__checkbox">
            <input type="checkbox" />
            <span>Теги</span>
          </label>

          <label class="search-dropdown__checkbox">
            <input type="checkbox" />
            <span>Просьбы</span>
          </label>

          <label class="search-dropdown__checkbox">
            <input type="checkbox" />
            <span>Контакты</span>
          </label>
        </div>

      </div>
    </div>
  }
</div>
